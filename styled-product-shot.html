<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product</title>
    <link rel="stylesheet" href="style.css" class="rel">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.8.3/css/lightgallery-bundle.min.css"
        as="style" onload="this.rel='stylesheet'">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0LM7S5864P"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-0LM7S5864P');
    </script>
</head>

<body>
    <div id="navbar"></div>
    <p class="title mt-3 mb-2">Styled Product Shot 情境照</p>
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-12 px-2 px-xl-5 py-3">
                <div class="row mb-2 justify-content-center">
                    <div id="fixh-thumbnails"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
    <script>
    const gallery = document.getElementById("fixh-thumbnails");

    let html = "";

    for (let i = 1; i <= 37; i++) {
        html += `
            <a class="gallery-item-b" href="Product/styled/styled-${i}.webp">
                <img src="Product/styled/styled-${i}-300px.webp" />
            </a>
        `;
    }

    gallery.innerHTML = html;
</script>
    <!-- lightgallery plugins -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.8.3/lightgallery.min.js"></script>
    <script>
        lightGallery(document.getElementById('fixh-thumbnails'), {
            download: false,
            zoom: false,
            rotate: false,
            actualSize: false,
        });
    </script>

</body>


</html>
